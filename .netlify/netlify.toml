functionsDirectory = "/Users/b3nt0/Code/vale-monorepo/marketing/netlify/functions"
functionsDirectoryOrigin = "config-v1"
headersOrigin = "config"
redirectsOrigin = "config"

[build]
publish = "/Users/b3nt0/Code/vale-monorepo/marketing/dist"
publishOrigin = "config"
commandOrigin = "config"
command = "npm run build"
functions = "/Users/b3nt0/Code/vale-monorepo/marketing/netlify/functions"

[build.environment]
NODE_VERSION = "20"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[functions]

[functions.emails]
included_files = ["./emails/**"]

[functions."*"]

[[plugins]]
origin = "ui"
package = "@netlify/plugin-emails"
pinned_version = "1"

[plugins.inputs]

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.woff2"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/screenshots/*"

[headers.values]
Cache-Control = "public, max-age=3600"

[[redirects]]
from = "/"
to = "/en"
status = 302.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]

[[redirects]]
from = "/en/*"
to = "/en/index.html"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]

[[redirects]]
from = "/pt/*"
to = "/pt/index.html"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]